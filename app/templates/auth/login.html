{% extends 'base.html' %}
{% block title %}Log In — Gym Tracker{% endblock %}
{% block content %}
<div style="max-width: 360px; margin: 60px auto;">
    <h1>Log In</h1>
    <div class="card">
        <form method="POST">
            <div style="margin-bottom: 16px;">
                <label style="display: block; font-size: 13px; color: #888; margin-bottom: 6px;">Username</label>
                <input type="text" name="username" required autofocus>
            </div>
            <div style="margin-bottom: 24px;">
                <label style="display: block; font-size: 13px; color: #888; margin-bottom: 6px;">Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Log In</button>
        </form>
    </div>
    <p style="text-align: center; font-size: 13px; color: #666; margin-top: 16px;">
        No account? <a href="{{ url_for('auth.register') }}" style="color: #4f8ef7;">Register</a>
    </p>
</div>
{% endblock %}
