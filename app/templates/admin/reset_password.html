{% extends 'base.html' %}
{% block title %}Reset Password — {{ user.username }}{% endblock %}
{% block content %}
<h1>Reset Password</h1>
<p style="color: #888; margin-bottom: 24px;">Setting new password for <strong style="color:#ddd;">{{ user.username }}</strong></p>
<div class="card" style="max-width: 360px;">
    <form method="POST">
        <div style="margin-bottom: 20px;">
            <label style="display: block; font-size: 13px; color: #888; margin-bottom: 6px;">New Password</label>
            <input type="password" name="password" required autofocus>
        </div>
        <div style="display: flex; gap: 12px;">
            <button type="submit" class="btn btn-primary">Set Password</button>
            <a href="{{ url_for('admin.users') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
